version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pacing-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pacing
      POSTGRES_PASSWORD: pacing
      POSTGRES_DB: pacing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacing"]
      interval: 5s
      timeout: 5s
      retries: 10

  pacing-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ENABLE_SERVER_FUNCTIONS: ${VITE_ENABLE_SERVER_FUNCTIONS:-false}
    container_name: pacing-api
    ports:
      - "8000:8000"
    # mount only backend source for live-reload; keep /pacing/static from the image
    # so rebuilt frontend assets are always what gets served
    volumes:
      - ./pacing:/pacing/pacing
      - ./shared:/pacing/shared
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    # command here overrides the CMD in the Dockerfile, so it will run the API when the container starts
    command: uvicorn pacing.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONPATH=/pacing
      - IS_LOCAL=${IS_LOCAL:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql://pacing:pacing@postgres:5432/pacing}
      - DATABASE_URL_LOCAL=${DATABASE_URL_LOCAL:-postgresql://pacing:pacing@postgres:5432/pacing}
      - DATABASE_URL_SUPABASE=${DATABASE_URL_SUPABASE:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-change-me-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
      - RIDEWITHGPS_API_KEY=${RIDEWITHGPS_API_KEY:-}
      - RIDEWITHGPS_CLIENT_ID=${RIDEWITHGPS_CLIENT_ID:-}
      - RIDEWITHGPS_CLIENT_SECRET=${RIDEWITHGPS_CLIENT_SECRET:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}

volumes:
  postgres_data:
